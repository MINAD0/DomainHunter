services:
  backend:
    build:
      context: ./backend
    environment:
      DOMAIN_HUNTER_DATA_DIR: /app/backend/data
      WHOISXML_API_KEY: ${WHOISXML_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - domain_hunter_data:/app/backend/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  domain_hunter_data:

